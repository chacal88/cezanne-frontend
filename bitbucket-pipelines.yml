image: mcr.microsoft.com/playwright:v1.54.2-noble

options:
  max-time: 15

definitions:
  caches:
    npm: /root/.npm
  steps:
    - step: &r0_smoke
        name: Recruit Frontend - R0 Smoke Gate
        caches:
          - npm
        script:
          - export CI=true
          - npm ci
          - env -u NO_COLOR npm run smoke:r0
        artifacts:
          - .r0-smoke-vite.log
          - test-results/**
          - playwright-report/**

pipelines:
  pull-requests:
    '**':
      - step: *r0_smoke
  branches:
    main:
      - step: *r0_smoke
    master:
      - step: *r0_smoke
